[extend]
useDefault = true

[[allowlists]]
description = "Allow commit SHA references in private working log"
paths = [
  '''^working\.md$''',
]
regexes = [
  '''`[a-f0-9]{40}`''',
]

[[allowlists]]
description = "Ignore generated build artifacts"
paths = [
  '''(^|/)target/''',
  '''(^|/)node_modules/''',
  '''(^|/)dist/''',
  '''(^|/)coverage/''',
  '''(^|/)\.vite/''',
  '''(^|/)\.turbo/''',
]
